<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moneda</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Conversor de Moneda</h1>
            <p>Tipos de cambio mundiales a tu alcance. Datos de mercado seguros, rápidos y precisos actualizados cada
                segundo.</p>
        </header>

        <main class="converter-card">
            <div class="converter-form">
                <div class="form-group amount-group">
                    <label for="amount">CANTIDAD</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="amount" name="amount" value="1000.00" step="0.01" min="0">
                    </div>
                </div>

                <div class="form-group from-group">
                    <label for="from-currency">DE</label>
                    <div class="select-wrapper">
                        <img src="" alt="" class="flag-icon" id="from-flag" style="display: none;">
                        <select id="from-currency" name="from-currency">
                            <!-- Options will be populated by JS -->
                        </select>
                    </div>
                </div>

                <div class="swap-wrapper">
                    <button id="swap-btn" class="swap-btn" aria-label="Intercambiar divisas">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M16 3L21 8L16 13M21 8H7M8 21L3 16L8 11M3 16H17" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>

                <div class="form-group to-group">
                    <label for="to-currency">A</label>
                    <div class="select-wrapper">
                        <img src="" alt="" class="flag-icon" id="to-flag" style="display: none;">
                        <select id="to-currency" name="to-currency">
                            <!-- Options will be populated by JS -->
                        </select>
                    </div>
                </div>
            </div>

            <div class="converter-result">
                <div class="result-main">
                    <div class="result-amount">
                        <span id="result-value">914.45</span>
                        <span id="result-currency">EUR</span>
                    </div>
                    <div class="result-meta">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                            class="info-icon">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                            <path d="M12 16V12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            <circle cx="12" cy="8" r="1.5" fill="currentColor" />
                        </svg>
                        <span id="rate-info">1 USD = 0.91445 EUR</span> • <span id="update-time">Actualizado hace 2
                            min</span>
                    </div>
                </div>

                <div class="performance-chart">
                    <div class="chart-header">
                        <span>RENDIMIENTO 7D</span>
                        <span class="positive-trend">~ +1.24%</span>
                    </div>
                    <div class="chart-bars">
                        <!-- Placeholder for visual similarity to design -->
                        <div class="bar" style="height: 30%"></div>
                        <div class="bar" style="height: 40%"></div>
                        <div class="bar" style="height: 35%"></div>
                        <div class="bar" style="height: 50%"></div>
                        <div class="bar" style="height: 45%"></div>
                        <div class="bar" style="height: 60%"></div>
                        <div class="bar" style="height: 80%"></div>
                    </div>
                </div>
            </div>

            <div id="loading-indicator" class="loading-indicator hidden">
                <div class="spinner"></div>
                <span>Actualizando tasas...</span>
            </div>

            <div class="history-toggle-wrapper">
                <button id="toggle-history-btn" class="toggle-history-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        class="arrow-icon">
                        <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    VER HISTORIAL
                </button>
            </div>

            <div id="history-section" class="history-section hidden">
                <h3>Últimas conversiones</h3>
                <ul id="history-list" class="history-list">
                    <!-- History items will be inserted here by JS -->
                </ul>
            </div>
        </main>

        <footer class="app-footer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 3L21 8L16 13M21 8H7M8 21L3 16L8 11M3 16H17" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>© 2026 serviciospalaciosweb.com</span>
        </footer>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
